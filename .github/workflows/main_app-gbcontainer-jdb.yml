# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy container app to Azure Web App - app-gbcontainer-jdb

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to container registry
        uses: docker/login-action@v2
        with:
          registry: crjjdb.azurecr.io/
          username: ${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_0E1DD74DE1EB4D888B1A6EC506EB4076 }}
          password: ${{ secrets.AZUREAPPSERVICE_CONTAINERPASSWORD_23CCFF674B184D2C9BEB273C81F78789 }}

      - name: Build and push container image to registry
        uses: docker/build-push-action@v3
        with:
          context: .
          push: true
          tags: crjjdb.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_0E1DD74DE1EB4D888B1A6EC506EB4076 }}/guestbook:${{ github.sha }}
          file: ./Dockerfile

  deploy:
    runs-on: ubuntu-latest
    
    needs: build
    
    steps:
      
      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'app-gbcontainer-jdb'
          slot-name: 'Production'
          images: 'crjjdb.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_0E1DD74DE1EB4D888B1A6EC506EB4076 }}/guestbook:${{ github.sha }}'
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_2A2A2EE72ED0445293387E671D9C9596 }}